services:
  # ─── Ollama (Local AI Server) ───────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: physiowave-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    # Uncomment for NVIDIA GPU support:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  # ─── Backend (FastAPI) ──────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: physiowave-backend
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - LLM_MODEL=gemma3:4b
      - VISION_MODEL=moondream
      - EMBEDDING_MODEL=nomic-embed-text
      - DATABASE_URL=sqlite:///./backend/data/physiowave.db
      - CHROMADB_PATH=./backend/data/chromadb
    volumes:
      - ./backend/data:/app/backend/data
      - ./backend/assets:/app/assets
    depends_on:
      - ollama
    restart: unless-stopped

  # ─── Frontend (Next.js) ────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: physiowave-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  ollama_data:
